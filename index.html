<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LAST CHAT</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000000;
    color: #F2F2F2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 18px;
    border-bottom: 1px solid #1E1E1E;
    background: #050505;
  }
  .logo {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #F2F2F2;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-size: 14px;
    font-weight: 700;
  }
  header span {
    font-weight: 700;
    letter-spacing: 0.5px;
    font-size: 15px;
    text-transform: uppercase;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user {
    align-self: flex-end;
    background: #F2F2F2;
    color: #000000;
    border-bottom-right-radius: 4px;
  }
  .assistant {
    align-self: flex-start;
    background: #151515;
    color: #F2F2F2;
    border: 1px solid #232323;
    border-bottom-left-radius: 4px;
  }
  .typing {
    align-self: flex-start;
    background: #151515;
    border: 1px solid #232323;
    padding: 12px 16px;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #777;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  #input-bar {
    border-top: 1px solid #1E1E1E;
    padding: 12px;
    background: #050505;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: #151515;
    border: 1px solid #232323;
    border-radius: 18px;
    padding: 8px 10px;
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: #F2F2F2;
    font-size: 14px;
    font-family: inherit;
    max-height: 120px;
    padding: 4px 2px;
  }
  textarea::placeholder { color: #6B6B6B; }
  button#send {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #F2F2F2;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  button#send:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  button#send svg { width: 15px; height: 15px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">L</div>
    <span>LAST CHAT</span>
  </header>
  <div id="messages"></div>
  <div id="input-bar">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Escribe un mensaje..."></textarea>
      <button id="send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  let history = [
    { role: 'assistant', content: 'Hola. Soy LAST CHAT — pregúntame lo que quieras.' }
  ];

  function render() {
    messagesEl.innerHTML = '';
    history.forEach(m => {
      const div = document.createElement('div');
      div.className = 'bubble ' + (m.role === 'user' ? 'user' : 'assistant');
      div.textContent = m.content;
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    history.push({ role: 'user', content: text });
    inputEl.value = '';
    render();
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: history.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await response.json();
      const reply = (data.content || []).map(b => b.text || '').join('\n') || 'No obtuve respuesta.';
      hideTyping();
      history.push({ role: 'assistant', content: reply });
      render();
    } catch (err) {
      hideTyping();
      history.push({ role: 'assistant', content: 'Hubo un error al conectar. Intenta de nuevo.' });
      render();
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  render();
</script>
</body>
</html>
